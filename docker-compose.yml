services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poligiros
      POSTGRES_USER: poligiros
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poligiros -d poligiros"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
